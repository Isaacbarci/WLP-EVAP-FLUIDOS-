<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Juntas por Fluído</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f4f6f9; }
    header { background:#0f766e; color:#fff; padding:16px; }
    .container { padding:16px; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
    select, input { padding:8px; border-radius:6px; border:1px solid #ccc; }
    button { padding:8px 12px; border:none; border-radius:6px; background:#0f766e; color:#fff; cursor:pointer; }
    table { width:100%; border-collapse: collapse; margin-top:10px; background:#fff; }
    th, td { padding:8px; border:1px solid #ddd; }
    th { background:#eee; }
    .status { margin:10px 0; color:#555; }
  </style>
</head>
<body>
<header>
  <h2>Dashboard Juntas por Fluído</h2>
</header>

<div class="container">

  <div class="filters">
    <input id="fContrato" placeholder="Contrato">
    <input id="fFluido" placeholder="Fluído">
    <input id="fDiam" placeholder="Diam">
    <input id="fEspessura" placeholder="Espessura">
    <input id="fProg" placeholder="Prog Fab">
    <input id="fBusca" placeholder="Busca geral">
    <button onclick="loadData()">Atualizar</button>
  </div>

  <div class="status" id="status">Pronto.</div>

  <h3>Resumo por Fluído</h3>
  <table>
    <thead>
      <tr><th>Fluído</th><th>Qtd</th></tr>
    </thead>
    <tbody id="resumo"></tbody>
  </table>

  <h3>Detalhamento</h3>
  <table>
    <thead>
      <tr>
        <th>Contrato</th>
        <th>Fluído</th>
        <th>Diam</th>
        <th>Espessura</th>
        <th>Prog Fab</th>
      </tr>
    </thead>
    <tbody id="dados"></tbody>
  </table>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzguErxwP-RFCSyVH77znydX5-75sauVO8eMRYzQaLgKkNTh2yCJkjUhvCb4L5lIUK0_g/exec";

function montarUrl() {
  const params = new URLSearchParams();

  const contrato = document.getElementById("fContrato").value.trim();
  const fluido = document.getElementById("fFluido").value.trim();
  const diam = document.getElementById("fDiam").value.trim();
  const espessura = document.getElementById("fEspessura").value.trim();
  const progFab = document.getElementById("fProg").value.trim();
  const busca = document.getElementById("fBusca").value.trim();

  if (contrato) params.set("contrato", contrato);
  if (fluido) params.set("fluido", fluido);
  if (diam) params.set("diam", diam);
  if (espessura) params.set("espessura", espessura);
  if (progFab) params.set("prog_fab", progFab);
  if (busca) params.set("busca", busca);

  return URL + "?" + params.toString();
}

async function loadData() {
  const status = document.getElementById("status");
  const tbodyResumo = document.getElementById("resumo");
  const tbodyDados = document.getElementById("dados");

  try {
    status.textContent = "Carregando...";
    tbodyResumo.innerHTML = "";
    tbodyDados.innerHTML = "";

    const res = await fetch(montarUrl(), { cache: "no-store" });
    const json = await res.json();

    if (!json.success) {
      throw new Error(json.error || "Erro ao carregar");
    }

    const resumo = json.resumo || [];
    const dados = json.data || [];

    resumo.forEach(item => {
      tbodyResumo.innerHTML += `<tr><td>${item.fluido}</td><td>${item.qtd}</td></tr>`;
    });

    dados.forEach(r => {
      tbodyDados.innerHTML += `
        <tr>
          <td>${r.CONTRATO || ""}</td>
          <td>${r["FLUÍDO"] || ""}</td>
          <td>${r.DIAM || ""}</td>
          <td>${r.ESPESSURA || ""}</td>
          <td>${r.PROG_FAB || ""}</td>
        </tr>
      `;
    });

    status.textContent = `${dados.length} registro(s) carregado(s).`;

  } catch (err) {
    console.error(err);
    status.textContent = "Erro: " + err.message;
  }
}

window.addEventListener("load", loadData);
</script>

</body>
</html>
